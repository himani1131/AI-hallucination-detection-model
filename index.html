<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hallucination Detection Engine</title>
  <link rel="stylesheet" href="ChatInterface.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const API_BASE_URL = window.location.origin;

    function App() {
      const [prompt, setPrompt] = React.useState("");
      const [currentChat, setCurrentChat] = React.useState(null);
      const [history, setHistory] = React.useState([]);
      const [user, setUser] = React.useState(null); 
      const [isLoading, setIsLoading] = React.useState(false);
      const [connectionStatus, setConnectionStatus] = React.useState("checking");
      const [errorMessage, setErrorMessage] = React.useState(null);

      const [loginName, setLoginName] = React.useState("");
      const [loginEmail, setLoginEmail] = React.useState("");
      const [consentChecked, setConsentChecked] = React.useState(false);

      React.useEffect(() => {
        async function loadInitialData() {
          try {
            const healthRes = await fetch(`${API_BASE_URL}/api/health`);
            if (!healthRes.ok) throw new Error();
            setConnectionStatus("connected");

            const userRes = await fetch(`${API_BASE_URL}/api/users`);
            if (userRes.ok) {
              const userData = await userRes.json();
              if (userData.name && userData.email) {
                setUser(userData);
                const historyRes = await fetch(`${API_BASE_URL}/api/history`);
                const historyData = await historyRes.json();
                setHistory(historyData.conversations || []);
              }
            }
          } catch (err) {
            setConnectionStatus("offline");
            setErrorMessage("Backend server connection failed.");
          }
        }
        loadInitialData();
      }, []);

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        if (!loginName.trim() || !loginEmail.trim() || !consentChecked) return;

        try {
          const res = await fetch(`${API_BASE_URL}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: loginName, email: loginEmail })
          });

          if (!res.ok) throw new Error();
          const data = await res.json();
          
          setUser({ name: data.name, email: data.email });
          setHistory([]); 
          setErrorMessage(null);
        } catch (err) {
          setErrorMessage("Failed to establish configuration profile session.");
        }
      };

      const handleLogout = async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/api/logout`, { method: "POST" });
          if (res.ok) {
            setUser(null);
            setHistory([]);
            setCurrentChat(null);
            setLoginName("");
            setLoginEmail("");
            setConsentChecked(false);
            setErrorMessage(null);
          }
        } catch (err) {
          setErrorMessage("Failed to safely terminate profile session.");
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!prompt.trim() || isLoading) return;

        setIsLoading(true);
        setErrorMessage(null);

        try {
          const res = await fetch(`${API_BASE_URL}/api/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: prompt })
          });

          if (!res.ok) throw new Error("Server error processing request");
          const data = await res.json();
          
          setCurrentChat(data);
          setPrompt("");

          const historyRes = await fetch(`${API_BASE_URL}/api/history`);
          if (historyRes.ok) {
            const historyData = await historyRes.json();
            setHistory(historyData.conversations || []);
          }
        } catch (err) {
          setErrorMessage(err.message || "Failed to communicate with AI Engine.");
        } finally {
          setIsLoading(false);
        }
      };

      if (!user) {
        return (
          <div className="login-screen-wrapper">
            <div className="login-modal-card">
              <div className="brand-mark">HD</div>
              <h2>Evaluation Session</h2>
              <p>Configure access criteria details to establish data tracking parameters.</p>
              
              {errorMessage && <div className="error-box">{errorMessage}</div>}
              
              <form onSubmit={handleLoginSubmit} className="login-control-form">
                <div className="form-input-group">
                  <label>User Identifiers</label>
                  <input 
                    type="text" 
                    placeholder="Enter name" 
                    value={loginName}
                    onChange={(e) => setLoginName(e.target.value)}
                    required
                  />
                </div>

                <div className="form-input-group">
                  <label>Email Address</label>
                  <input 
                    type="email" 
                    placeholder="Enter email" 
                    value={loginEmail}
                    onChange={(e) => setLoginEmail(e.target.value)}
                    required
                  />
                </div>

                <div className="form-consent-row">
                  <input 
                    type="checkbox" 
                    id="consentCheck"
                    checked={consentChecked}
                    onChange={(e) => setConsentChecked(e.target.checked)}
                    required
                  />
                  <label htmlFor="consentCheck">
                    Confirm explicit authorization to record profile tokens and process metadata structures safely.
                  </label>
                </div>

                <button 
                  type="submit" 
                  className="login-action-btn"
                  disabled={!loginName.trim() || !loginEmail.trim() || !consentChecked || connectionStatus === "offline"}
                >
                  Authorize Profile Session
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="page-shell">
          <aside className="sidebar">
            <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
              <div className="brand-mark">HD</div>
              <div style={{ flexGrow: 1, minWidth: 0 }}>
                <p className="eyebrow">Welcome,</p>
                <h2 style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</h2>
              </div>
            </div>
            
            <div style={{ borderBottom: "1px solid #d5dee9", paddingBottom: "4px" }} />
            <h2>History Log</h2>
            
            <div className="history-list">
              {history.length === 0 ? (
                <p className="empty-history">No past entries</p>
              ) : (
                history.map((item, index) => (
                  <div key={index} className="history-item">
                    <span><strong>Q:</strong> {item.prompt}</span>
                    <div className={`history-verdict ${item.score >= 0.45 ? 'history-verdict--hallucinated' : 'history-verdict--grounded'}`}>
                      Risk Index: {Math.round(item.score * 100)}%
                    </div>
                  </div>
                ))
              )}
            </div>

            <div style={{ marginTop: "auto", display: "flex", flexDirection: "column", gap: "14px" }}>
              <button onClick={handleLogout} className="logout-action-btn">
                Logout Session
              </button>
            </div>
          </aside>

          <main className="main-panel">
            <header className="hero-header">
              <h1>AI Hallucination Engine</h1>
              <p className="header-copy">Evaluate natural language responses through token confidence, NLI consistency checks, and verification against facts.</p>
            </header>

            <div className="response-area">
              {errorMessage && <div className="error-box">{errorMessage}</div>}

              {currentChat ? (
                <div className="response-card">
                  <div className={`verdict-strip verdict-strip--${currentChat.verdict}`}>
                    <span>Verdict: {currentChat.verdict}</span>
                    <div>Metrics Index Score: {Math.round(currentChat.hallucination_score * 100)}%</div>
                  </div>

                  <div style={{ padding: "20px", background: "#f8fafc", borderBottom: "1px solid #edf2f7", display: "flex", flexDirection: "column", gap: "12px" }}>
                    <h4 style={{ margin: 0, fontSize: "12px", textTransform: "uppercase", color: "#64748b", tracking: "0.5px" }}>Diagnostic Score Breakdown</h4>
                    
                    <div>
                      <div style={{ display: "flex", justifyContent: "between", fontSize: "13px", marginBottom: "4px" }}>
                        <span>NLI Factual Inconsistency Risk</span>
                        <span style={{ marginLeft: "auto", fontWeight: "bold" }}>{Math.round(currentChat.nli_score * 100)}%</span>
                      </div>
                      <div style={{ width: "100%", height: "6px", background: "#cbd5e1", borderRadius: "3px", overflow: "hidden" }}>
                        <div style={{ width: `${currentChat.nli_score * 100}%`, height: "100%", background: "#6366f1" }}></div>
                      </div>
                    </div>

                    <div>
                      <div style={{ display: "flex", justifyContent: "between", fontSize: "13px", marginBottom: "4px" }}>
                        <span>RAG Knowledge Disalignment Risk</span>
                        <span style={{ marginLeft: "auto", fontWeight: "bold" }}>{Math.round(currentChat.rag_score * 100)}%</span>
                      </div>
                      <div style={{ width: "100%", height: "6px", background: "#cbd5e1", borderRadius: "3px", overflow: "hidden" }}>
                        <div style={{ width: `${currentChat.rag_score * 100}%`, height: "100%", background: "#0ea5e9" }}></div>
                      </div>
                    </div>

                    <div>
                      <div style={{ display: "flex", justifyContent: "between", fontSize: "13px", marginBottom: "4px" }}>
                        <span>LLM Token Structural Uncertainty</span>
                        <span style={{ marginLeft: "auto", fontWeight: "bold" }}>{Math.round(currentChat.uncertainty_score * 100)}%</span>
                      </div>
                      <div style={{ width: "100%", height: "6px", background: "#cbd5e1", borderRadius: "3px", overflow: "hidden" }}>
                        <div style={{ width: `${currentChat.uncertainty_score * 100}%`, height: "100%", background: "#10b981" }}></div>
                      </div>
                    </div>
                  </div>

                  <div className="message-section">
                    <span>Prompt Query</span>
                    <p>{currentChat.prompt}</p>
                  </div>
                  <div className="message-section">
                    <span>Generated AI Content</span>
                    <p>{currentChat.response}</p>
                  </div>
                </div>
              ) : (
                !isLoading && (
                  <div style={{ textAlign: "center", color: "#94a3b8", fontSize: "15px", marginTop: "40px" }}>
                    Enter a data query below to initiate structural evaluation diagnostics.
                  </div>
                )
              )}

              {isLoading && (
                <div className="loading-indicator">
                  <div className="spinner"></div>
                  <span>Calculating score synthesis (NLI & RAG vectors)...</span>
                </div>
              )}
            </div>

            <form onSubmit={handleSubmit} className="prompt-form">
              <input 
                type="text" 
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="Ask something to check for structural hallucinations (e.g., 'Who invented the telephone?')"
                disabled={isLoading}
              />
              <button type="submit" disabled={isLoading || !prompt.trim()}>
                {isLoading ? "Running..." : "Evaluate"}
              </button>
            </form>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
